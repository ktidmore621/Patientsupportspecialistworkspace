<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Patient Support Specialist Workspace</title>
    <!--
      GitHub Pages SPA redirect.
      When a user navigates directly to a deep link (e.g. /cases), GitHub Pages
      returns this 404.html. The script below encodes the intended path into the
      query string and redirects to the app root, where index.html picks it up
      and restores the original URL via history.replaceState.
    -->
    <script>
      var segmentCount = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
